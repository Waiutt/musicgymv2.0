name: Android CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Inject AMap API Key
        run: echo "AMAP_API_KEY=${{ secrets.AMAP_API_KEY }}" >> local.properties

      - name: Build with Gradle
        run: ./gradlew assembleDebug
