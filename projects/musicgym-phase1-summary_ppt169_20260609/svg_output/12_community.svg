<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#0F172A"/>
  <rect x="0" y="0" width="1280" height="6" fill="#FC4C02"/>
  <text x="80" y="60" font-family="Arial" font-size="36" fill="#FFFFFF" font-weight="bold">社区社交系统</text>
  <line x1="80" y1="80" x2="300" y2="80" stroke="#FC4C02" stroke-width="3"/>
  <text x="80" y="115" font-family="Arial" font-size="18" fill="#38BDF8">Firebase Firestore 驱动 · 匿名登录 · 离线降级</text>

  <!-- Evolution -->
  <rect x="60" y="155" width="240" height="60" rx="10" fill="#EF4444"/>
  <text x="180" y="180" text-anchor="middle" font-family="Arial" font-size="16" fill="#FFFFFF" font-weight="bold">v5.1 基础版 55%</text>
  <text x="180" y="200" text-anchor="middle" font-family="Arial" font-size="13" fill="#FFFFFF">发帖+点赞+评论</text>
  <text x="300" y="185" font-family="Arial" font-size="28" fill="#FC4C02">→</text>
  <rect x="350" y="155" width="260" height="60" rx="10" fill="#F59E0B"/>
  <text x="480" y="180" text-anchor="middle" font-family="Arial" font-size="16" fill="#FFFFFF" font-weight="bold">v5.2 升级 75%</text>
  <text x="480" y="200" text-anchor="middle" font-family="Arial" font-size="13" fill="#FFFFFF">+下拉刷新+自动发帖+用户主页+举报</text>
  <text x="610" y="185" font-family="Arial" font-size="28" fill="#FC4C02">→</text>
  <rect x="660" y="155" width="300" height="60" rx="10" fill="#22C55E"/>
  <text x="810" y="180" text-anchor="middle" font-family="Arial" font-size="16" fill="#FFFFFF" font-weight="bold">v5.2 社交版 85%</text>
  <text x="810" y="200" text-anchor="middle" font-family="Arial" font-size="13" fill="#FFFFFF">+关注+挑战+活动流</text>

  <!-- Feature blocks -->
  <rect x="60" y="260" width="370" height="200" rx="12" fill="#1E293B"/>
  <text x="245" y="295" text-anchor="middle" font-family="Arial" font-size="20" fill="#38BDF8" font-weight="bold">👥 关注系统</text>
  <text x="90" y="330" font-family="Arial" font-size="16" fill="#9CA3AF">● followUser / unfollowUser</text>
  <text x="90" y="360" font-family="Arial" font-size="16" fill="#9CA3AF">● isFollowing 状态检测</text>
  <text x="90" y="390" font-family="Arial" font-size="16" fill="#9CA3AF">● 粉丝数 / 关注数 统计</text>
  <text x="90" y="420" font-family="Arial" font-size="16" fill="#9CA3AF">● Firestore follows 集合</text>

  <rect x="455" y="260" width="370" height="200" rx="12" fill="#1E293B"/>
  <text x="640" y="295" text-anchor="middle" font-family="Arial" font-size="20" fill="#F59E0B" font-weight="bold">🏆 挑战系统</text>
  <text x="485" y="330" font-family="Arial" font-size="16" fill="#9CA3AF">● 创建挑战 (目标+时限)</text>
  <text x="485" y="360" font-family="Arial" font-size="16" fill="#9CA3AF">● 加入挑战 / 进度更新</text>
  <text x="485" y="390" font-family="Arial" font-size="16" fill="#9CA3AF">● 排行榜 (按进度排序)</text>
  <text x="485" y="420" font-family="Arial" font-size="16" fill="#9CA3AF">● 运动完成自动同步</text>

  <rect x="850" y="260" width="370" height="200" rx="12" fill="#1E293B"/>
  <text x="1035" y="295" text-anchor="middle" font-family="Arial" font-size="20" fill="#22C55E" font-weight="bold">📝 活动流</text>
  <text x="880" y="330" font-family="Arial" font-size="16" fill="#9CA3AF">● 运动后自动生成动态</text>
  <text x="880" y="360" font-family="Arial" font-size="16" fill="#9CA3AF">● PR 成就自动发帖</text>
  <text x="880" y="390" font-family="Arial" font-size="16" fill="#9CA3AF">● publishActivity 方法</text>
  <text x="880" y="420" font-family="Arial" font-size="16" fill="#9CA3AF">● 配速/动作/热量详情</text>

  <!-- Firestore collections -->
  <rect x="60" y="495" width="1160" height="100" rx="12" fill="#1E293B"/>
  <text x="100" y="530" font-family="Arial" font-size="18" fill="#FFFFFF" font-weight="bold">Firestore 数据模型</text>
  <text x="100" y="565" font-family="Arial" font-size="16" fill="#9CA3AF">posts {userId, nickname, title, content, imageUri, timestamp, likes[], comments[]} | follows {followerId, followingId} | challenges {title, goalValue, goalType, participants[], endDate} | reports {postId, reporterId, reason}</text>

  <!-- Remaining -->
  <rect x="60" y="620" width="1160" height="40" rx="8" fill="#334155"/>
  <text x="640" y="646" text-anchor="middle" font-family="Arial" font-size="16" fill="#F59E0B">待完成: 挑战 UI 集成 (已实现后端) · 活动流 UI 优化 (帖子内显示配速标签) · 举报审核后台</text>
</svg>