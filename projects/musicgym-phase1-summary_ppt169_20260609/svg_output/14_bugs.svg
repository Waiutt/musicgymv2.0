<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#0F172A"/>
  <rect x="0" y="0" width="1280" height="6" fill="#FC4C02"/>
  <text x="80" y="60" font-family="Arial" font-size="36" fill="#FFFFFF" font-weight="bold">真机测试 Bug 修复实录</text>
  <line x1="80" y1="80" x2="380" y2="80" stroke="#FC4C02" stroke-width="3"/>

  <!-- Bug cards -->
  <rect x="60" y="120" width="590" height="130" rx="12" fill="#1E293B" stroke="#EF4444" stroke-width="1"/>
  <text x="90" y="155" font-family="Arial" font-size="18" fill="#EF4444" font-weight="bold">🐛 Bug 1: 音乐播放按钮变形</text>
  <text x="90" y="185" font-family="Arial" font-size="14" fill="#9CA3AF">症状: 拖动歌单面板时播放按钮被挤压变形</text>
  <text x="90" y="210" font-family="Arial" font-size="14" fill="#22C55E">修复: 布局重构 — 播放器/mni条/歌单三层分离,面板改为点击展开</text>

  <rect x="690" y="120" width="530" height="130" rx="12" fill="#1E293B" stroke="#EF4444" stroke-width="1"/>
  <text x="720" y="155" font-family="Arial" font-size="18" fill="#EF4444" font-weight="bold">🐛 Bug 2: 地图显示世界地图</text>
  <text x="720" y="185" font-family="Arial" font-size="14" fill="#9CA3AF">症状: GPS定位前显示整个地球</text>
  <text x="720" y="210" font-family="Arial" font-size="14" fill="#22C55E">修复: moveCamera 预置到 zoom=15 街道级</text>

  <rect x="60" y="275" width="590" height="130" rx="12" fill="#1E293B" stroke="#EF4444" stroke-width="1"/>
  <text x="90" y="310" font-family="Arial" font-size="18" fill="#EF4444" font-weight="bold">🐛 Bug 3: 社区发帖失败</text>
  <text x="90" y="340" font-family="Arial" font-size="14" fill="#9CA3AF">症状: 点击发布无反应, Firebase signIn 异步未完成</text>
  <text x="90" y="365" font-family="Arial" font-size="14" fill="#22C55E">修复: 发布时重新 signIn 获取 userId, 空值 Toast 提示</text>

  <rect x="690" y="275" width="530" height="130" rx="12" fill="#1E293B" stroke="#EF4444" stroke-width="1"/>
  <text x="720" y="310" font-family="Arial" font-size="18" fill="#EF4444" font-weight="bold">🐛 Bug 4: 个人页闪退</text>
  <text x="720" y="340" font-family="Arial" font-size="14" fill="#9CA3AF">Fragment 重建时旧 Executor 任务访问新 View 导致 NPE</text>
  <text x="720" y="365" font-family="Arial" font-size="14" fill="#22C55E">修复: View 引用局部 final 捕获 + 全 executor 任务 try-catch</text>

  <rect x="60" y="430" width="590" height="130" rx="12" fill="#1E293B" stroke="#EF4444" stroke-width="1"/>
  <text x="90" y="465" font-family="Arial" font-size="18" fill="#EF4444" font-weight="bold">🐛 Bug 5: 成就解锁后个人页再次闪退</text>
  <text x="90" y="495" font-family="Arial" font-size="14" fill="#9CA3AF">getContext() 在后台线程返回 null</text>
  <text x="90" y="520" font-family="Arial" font-size="14" fill="#22C55E">修复: 局部 final Context 捕获 + null 全守卫</text>

  <!-- Summary -->
  <rect x="60" y="595" width="1160" height="45" rx="10" fill="#334155"/>
  <text x="640" y="624" text-anchor="middle" font-family="Arial" font-size="18" fill="#38BDF8">5 个 Bug · 全部修复 · 真机验证通过 · APK 已更新至桌面 MusicGym_v5.2_debug.apk</text>
