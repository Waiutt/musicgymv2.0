<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#0F172A"/>
  <rect x="0" y="0" width="1280" height="6" fill="#FC4C02"/>
  <text x="80" y="70" font-family="Arial" font-size="36" fill="#FFFFFF" font-weight="bold">Vibe Coding 开发流程</text>
  <line x1="80" y1="90" x2="380" y2="90" stroke="#FC4C02" stroke-width="3"/>

  <!-- Flow arrows -->
  <defs><marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#FC4C02"/></marker></defs>

  <!-- Step boxes -->
  <rect x="60" y="140" width="200" height="80" rx="12" fill="#1E293B" stroke="#38BDF8" stroke-width="2"/>
  <text x="160" y="175" text-anchor="middle" font-family="Arial" font-size="18" fill="#38BDF8" font-weight="bold">💬 需求描述</text>
  <text x="160" y="200" text-anchor="middle" font-family="Arial" font-size="14" fill="#9CA3AF">自然语言输入</text>
  <line x1="260" y1="180" x2="300" y2="180" stroke="#FC4C02" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="305" y="140" width="200" height="80" rx="12" fill="#1E293B" stroke="#FC4C02" stroke-width="2"/>
  <text x="405" y="175" text-anchor="middle" font-family="Arial" font-size="18" fill="#FC4C02" font-weight="bold">🤖 AI 生成</text>
  <text x="405" y="200" text-anchor="middle" font-family="Arial" font-size="14" fill="#9CA3AF">方案 + 代码</text>
  <line x1="505" y1="180" x2="545" y2="180" stroke="#FC4C02" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="550" y="140" width="200" height="80" rx="12" fill="#1E293B" stroke="#22C55E" stroke-width="2"/>
  <text x="650" y="175" text-anchor="middle" font-family="Arial" font-size="18" fill="#22C55E" font-weight="bold">👤 人工审查</text>
  <text x="650" y="200" text-anchor="middle" font-family="Arial" font-size="14" fill="#9CA3AF">关键决策确认</text>
  <line x1="750" y1="180" x2="790" y2="180" stroke="#FC4C02" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="795" y="140" width="200" height="80" rx="12" fill="#1E293B" stroke="#A78BFA" stroke-width="2"/>
  <text x="895" y="175" text-anchor="middle" font-family="Arial" font-size="18" fill="#A78BFA" font-weight="bold">📦 编译验证</text>
  <text x="895" y="200" text-anchor="middle" font-family="Arial" font-size="14" fill="#9CA3AF">assembleDebug</text>
  <line x1="995" y1="180" x2="1035" y2="180" stroke="#FC4C02" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="1040" y="140" width="180" height="80" rx="12" fill="#1E293B" stroke="#F59E0B" stroke-width="2"/>
  <text x="1130" y="175" text-anchor="middle" font-family="Arial" font-size="18" fill="#F59E0B" font-weight="bold">📱 真机测试</text>
  <text x="1130" y="200" text-anchor="middle" font-family="Arial" font-size="14" fill="#9CA3AF">反馈迭代</text>

  <!-- Loop arrow -->
  <path d="M 1130 220 Q 640 290 160 220" fill="none" stroke="#FC4C02" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrow)"/>
  <text x="640" y="275" text-anchor="middle" font-family="Arial" font-size="14" fill="#6B7280">循环迭代 (单会话最高 35 次提交)</text>

  <!-- Stats row -->
  <rect x="60" y="330" width="370" height="100" rx="12" fill="#1E293B"/>
  <text x="245" y="370" text-anchor="middle" font-family="Arial" font-size="32" fill="#FC4C02" font-weight="bold">70%</text>
  <text x="245" y="400" text-anchor="middle" font-family="Arial" font-size="16" fill="#9CA3AF">AI 生成代码占比</text>

  <rect x="445" y="330" width="370" height="100" rx="12" fill="#1E293B"/>
  <text x="630" y="370" text-anchor="middle" font-family="Arial" font-size="32" fill="#38BDF8" font-weight="bold">10 轮</text>
  <text x="630" y="400" text-anchor="middle" font-family="Arial" font-size="16" fill="#9CA3AF">全维度代码审计</text>

  <rect x="830" y="330" width="390" height="100" rx="12" fill="#1E293B"/>
  <text x="1025" y="370" text-anchor="middle" font-family="Arial" font-size="32" fill="#22C55E" font-weight="bold">35 commits/会话</text>
  <text x="1025" y="400" text-anchor="middle" font-family="Arial" font-size="16" fill="#9CA3AF">最高单会话效率</text>

  <!-- Detail bullets -->
  <text x="80" y="490" font-family="Arial" font-size="20" fill="#FFFFFF" font-weight="bold">关键特征</text>
  <text x="80" y="530" font-family="Arial" font-size="17" fill="#9CA3AF">● AI 负责代码生成、测试编写、Bug修复——人工负责架构决策、安全审查、最终验收</text>
  <text x="80" y="565" font-family="Arial" font-size="17" fill="#9CA3AF">● 每批次改动 → 编译验证 → Lint 检查 → 真机测试 → 修复 → 提交</text>
  <text x="80" y="600" font-family="Arial" font-size="17" fill="#9CA3AF">● 单会话实现 7 项新功能 + 20+ Bug修复 + 5轮审计 + 无障碍/性能/兼容性优化</text>
</svg>