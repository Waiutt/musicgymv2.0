<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#0F172A"/>
  <rect x="0" y="0" width="1280" height="6" fill="#FC4C02"/>
  <text x="80" y="70" font-family="Arial" font-size="36" fill="#FFFFFF" font-weight="bold">AI + 人工协作模式</text>
  <line x1="80" y1="90" x2="380" y2="90" stroke="#FC4C02" stroke-width="3"/>

  <!-- Left: AI -->
  <rect x="60" y="140" width="560" height="520" rx="16" fill="#1E293B" stroke="#38BDF8" stroke-width="2"/>
  <text x="340" y="190" text-anchor="middle" font-family="Arial" font-size="24" fill="#38BDF8" font-weight="bold">🤖 AI (Claude Code)</text>
  <line x1="100" y1="210" x2="580" y2="210" stroke="#334155" stroke-width="1"/>

  <text x="100" y="260" font-family="Arial" font-size="18" fill="#FFFFFF">✅ 代码生成（Java / XML）</text>
  <text x="100" y="300" font-family="Arial" font-size="18" fill="#FFFFFF">✅ 方案设计 + 选项分析</text>
  <text x="100" y="340" font-family="Arial" font-size="18" fill="#FFFFFF">✅ 多轮代码审计（5维度）</text>
  <text x="100" y="380" font-family="Arial" font-size="18" fill="#FFFFFF">✅ Bug 定位 + 修复代码</text>
  <text x="100" y="420" font-family="Arial" font-size="18" fill="#FFFFFF">✅ 文档生成（README/作品集）</text>
  <text x="100" y="460" font-family="Arial" font-size="18" fill="#FFFFFF">✅ 构建验证 + Lint 检查</text>
  <text x="100" y="500" font-family="Arial" font-size="18" fill="#FFFFFF">✅ 测试用例编写</text>
  <text x="100" y="540" font-family="Arial" font-size="18" fill="#FFFFFF">✅ UI 布局优化</text>
  <text x="100" y="580" font-family="Arial" font-size="18" fill="#FFFFFF">✅ 兼容性分析</text>

  <!-- Right: Human -->
  <rect x="660" y="140" width="560" height="520" rx="16" fill="#1E293B" stroke="#FC4C02" stroke-width="2"/>
  <text x="940" y="190" text-anchor="middle" font-family="Arial" font-size="24" fill="#FC4C02" font-weight="bold">👤 人工（关键决策）</text>
  <line x1="700" y1="210" x2="1180" y2="210" stroke="#334155" stroke-width="1"/>

  <text x="700" y="260" font-family="Arial" font-size="18" fill="#22C55E">🎯 需求定义 + 优先级排序</text>
  <text x="700" y="300" font-family="Arial" font-size="18" fill="#22C55E">🎯 架构决策（MVVM/Room/Firebase）</text>
  <text x="700" y="340" font-family="Arial" font-size="18" fill="#22C55E">🎯 安全审查（API Key/备份/签名）</text>
  <text x="700" y="380" font-family="Arial" font-size="18" fill="#22C55E">🎯 方案确认（AI建议的取舍）</text>
  <text x="700" y="420" font-family="Arial" font-size="18" fill="#22C55E">🎯 真机测试 + 反馈</text>
  <text x="700" y="460" font-family="Arial" font-size="18" fill="#22C55E">🎯 产品方向（功能取舍/ROADMAP）</text>
  <text x="700" y="500" font-family="Arial" font-size="18" fill="#22C55E">🎯 最终验收（代码合入/发布）</text>
  <text x="700" y="540" font-family="Arial" font-size="18" fill="#22C55E">🎯 外部资源获取（Firebase/GitHub）</text>
  <text x="700" y="580" font-family="Arial" font-size="18" fill="#22C55E">🎯 简历包装 + 作品集输出</text>
</svg>