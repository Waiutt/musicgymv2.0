<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#0F172A"/>
  <rect x="0" y="0" width="1280" height="6" fill="#FC4C02"/>
  <text x="80" y="60" font-family="Arial" font-size="36" fill="#FFFFFF" font-weight="bold">数据库设计</text>
  <line x1="80" y1="80" x2="300" y2="80" stroke="#FC4C02" stroke-width="3"/>

  <!-- Migration chain -->
  <rect x="60" y="130" width="140" height="50" rx="8" fill="#38BDF8"/>
  <text x="130" y="161" text-anchor="middle" font-family="Arial" font-size="18" fill="#FFFFFF" font-weight="bold">v1 初始</text>
  <text x="200" y="155" font-family="Arial" font-size="24" fill="#FC4C02">→</text>
  <rect x="230" y="130" width="200" height="50" rx="8" fill="#1E293B" stroke="#38BDF8" stroke-width="1"/>
  <text x="330" y="161" text-anchor="middle" font-family="Arial" font-size="17" fill="#FFFFFF">v2 +Workout</text>
  <text x="430" y="155" font-family="Arial" font-size="24" fill="#FC4C02">→</text>
  <rect x="460" y="130" width="210" height="50" rx="8" fill="#1E293B" stroke="#38BDF8" stroke-width="1"/>
  <text x="565" y="161" text-anchor="middle" font-family="Arial" font-size="17" fill="#FFFFFF">v3 +Strength</text>
  <text x="670" y="155" font-family="Arial" font-size="24" fill="#FC4C02">→</text>
  <rect x="700" y="130" width="240" height="50" rx="8" fill="#1E293B" stroke="#38BDF8" stroke-width="1"/>
  <text x="820" y="161" text-anchor="middle" font-family="Arial" font-size="17" fill="#FFFFFF">v4 +Measurement</text>
  <text x="940" y="155" font-family="Arial" font-size="24" fill="#FC4C02">→</text>
  <rect x="970" y="130" width="250" height="50" rx="8" fill="#22C55E"/>
  <text x="1095" y="161" text-anchor="middle" font-family="Arial" font-size="17" fill="#FFFFFF" font-weight="bold">v5 +Playlist ✅</text>

  <!-- 8 Entities table -->
  <text x="80" y="240" font-family="Arial" font-size="22" fill="#38BDF8" font-weight="bold">8 个 Entity</text>
  <rect x="60" y="265" width="1160" height="180" rx="12" fill="#1E293B"/>

  <rect x="80" y="285" width="200" height="40" rx="6" fill="#334155"/>
  <text x="180" y="311" text-anchor="middle" font-family="Arial" font-size="15" fill="#FFFFFF">WorkoutRecord</text>
  <rect x="295" y="285" width="200" height="40" rx="6" fill="#334155"/>
  <text x="395" y="311" text-anchor="middle" font-family="Arial" font-size="15" fill="#FFFFFF">StrengthRecord</text>
  <rect x="510" y="285" width="200" height="40" rx="6" fill="#334155"/>
  <text x="610" y="311" text-anchor="middle" font-family="Arial" font-size="15" fill="#FFFFFF">WeightRecord</text>
  <rect x="725" y="285" width="200" height="40" rx="6" fill="#334155"/>
  <text x="825" y="311" text-anchor="middle" font-family="Arial" font-size="15" fill="#FFFFFF">BodyMeasurement</text>
  <rect x="940" y="285" width="260" height="40" rx="6" fill="#334155"/>
  <text x="1070" y="311" text-anchor="middle" font-family="Arial" font-size="15" fill="#FFFFFF">WorkoutTemplate</text>

  <rect x="80" y="340" width="200" height="40" rx="6" fill="#334155"/>
  <text x="180" y="366" text-anchor="middle" font-family="Arial" font-size="15" fill="#FFFFFF">BlogPost</text>
  <rect x="295" y="340" width="200" height="40" rx="6" fill="#22C55E"/>
  <text x="395" y="366" text-anchor="middle" font-family="Arial" font-size="15" fill="#FFFFFF">🆕 Playlist</text>
  <rect x="510" y="340" width="200" height="40" rx="6" fill="#22C55E"/>
  <text x="610" y="366" text-anchor="middle" font-family="Arial" font-size="15" fill="#FFFFFF">🆕 PlaylistSong</text>

  <!-- 7 DAOs -->
  <text x="80" y="490" font-family="Arial" font-size="22" fill="#22C55E" font-weight="bold">7 个 DAO</text>
  <rect x="60" y="515" width="1160" height="80" rx="12" fill="#1E293B"/>
  <text x="100" y="560" font-family="Arial" font-size="16" fill="#9CA3AF">WorkoutRecordDao · StrengthRecordDao · WeightRecordDao · BodyMeasurementDao · WorkoutTemplateDao · BlogPostDao · 🆕 PlaylistDao</text>

  <!-- Design decisions -->
  <text x="80" y="650" font-family="Arial" font-size="18" fill="#6B7280">设计要点：双重检查锁单例 · ApplicationContext 防止内存泄漏 · exportSchema=false · ProGuard 全量 Keep 规则</text>
</svg>