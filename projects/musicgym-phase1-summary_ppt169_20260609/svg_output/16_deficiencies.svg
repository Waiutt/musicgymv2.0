<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#0F172A"/>
  <rect x="0" y="0" width="1280" height="6" fill="#FC4C02"/>
  <text x="80" y="60" font-family="Arial" font-size="36" fill="#FFFFFF" font-weight="bold">项目不足之处</text>
  <line x1="80" y1="80" x2="300" y2="80" stroke="#EF4444" stroke-width="3"/>
  <text x="80" y="115" font-family="Arial" font-size="17" fill="#9CA3AF">坦诚分析当前版本的技术债、缺失功能和流程短板</text>

  <!-- Tech debt -->
  <text x="80" y="170" font-family="Arial" font-size="22" fill="#EF4444" font-weight="bold">⚠️ 技术债</text>
  <rect x="60" y="190" width="1160" height="155" rx="12" fill="#1E293B"/>
  <text x="100" y="225" font-family="Arial" font-size="16" fill="#9CA3AF">🔴 0 个单元测试运行 (Robolectric 4.12 不兼容 compileSdk 36, 14个测试编译通过但无法执行)</text>
  <text x="100" y="258" font-family="Arial" font-size="16" fill="#9CA3AF">🔴 ~75 条硬编码中文字符串未提取到 strings.xml (已在字符串文件定义,但未全量替换引用)</text>
  <text x="100" y="291" font-family="Arial" font-size="16" fill="#9CA3AF">🟡 剩余 2 个 Fragment (Profile/Share) 未 MVVM 化 — 混合架构,状态管理分散</text>
  <text x="100" y="324" font-family="Arial" font-size="16" fill="#9CA3AF">🟡 dp() / WRAP 在 4 个文件中重复定义 (均为 UiUtils 委托,非真正重复但不利新人理解)</text>

  <!-- Missing features -->
  <text x="80" y="385" font-family="Arial" font-size="22" fill="#F59E0B" font-weight="bold">📋 缺失功能</text>
  <rect x="60" y="405" width="1160" height="130" rx="12" fill="#1E293B"/>
  <text x="100" y="440" font-family="Arial" font-size="16" fill="#9CA3AF">🔴 MediaSession 蓝牙线控 (已实现但真机崩溃回退,需用 Media3 API 重写)</text>
  <text x="100" y="473" font-family="Arial" font-size="16" fill="#9CA3AF">🟡 力量训练 GIF 动作演示 (6张GIF已下载,未实现展示逻辑 · 超级组 · 训练笔记 UI)</text>
  <text x="100" y="506" font-family="Arial" font-size="16" fill="#9CA3AF">🟡 统计: 周/年视图 · 周报推送 · 目标配速提醒 · 分段配速 · Spotify 集成 · 歌词显示</text>

  <!-- Process gaps -->
  <text x="80" y="575" font-family="Arial" font-size="22" fill="#A78BFA" font-weight="bold">🔧 流程短板</text>
  <rect x="60" y="595" width="1160" height="90" rx="12" fill="#1E293B"/>
  <text x="100" y="630" font-family="Arial" font-size="16" fill="#9CA3AF">● 真机测试仅 1 台设备 (红米),未覆盖三星/华为/OPPO 等 OEM · 无 CI/CD 自动构建 · 无 Crashlytics 崩溃收集</text>
  <text x="100" y="663" font-family="Arial" font-size="16" fill="#9CA3AF">● Vibe Coding 模式下代码生成速度依赖网络稳定性 · 批量替换含中文路径文件时 Python GBK 编码问题频发</text>
</svg>